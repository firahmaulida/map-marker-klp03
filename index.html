<!DOCTYPE html>
<html>
  <head>
    <title>Web GIS Sekolah di Banda Aceh</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- CSS Leaflet untuk tampilan peta dasar -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css"
    />
    <!-- CSS plugin MarkerCluster untuk pengelompokan marker -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.css"
    />
    <!-- CSS default tema MarkerCluster -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.css"
    />
    <!-- CSS kustom aplikasi ini -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Header aplikasi: judul dan tombol "Tentang" -->
    <div class="header">
      <h1 class="title">Web GIS Sekolah di Banda Aceh</h1>
      <div>
        <button id="aboutBtn">Tentang</button>
      </div>
    </div>

    <!-- Area kontrol: pencarian dan filter jenis sekolah -->
    <div class="controls">
      <div class="search-container">
        <!-- Input pencarian sekolah, aktif saat tekan Enter -->
        <input type="text" id="search" placeholder="Cari sekolah..." />
      </div>
      <div class="filter-container">
        <label for="layerFilter">Filter:</label>
        <!-- Dropdown filter, opsi jenis sekolah diisi secara dinamis lewat JS -->
        <select id="layerFilter">
          <option value="all">Semua Sekolah</option>
          <!-- Filter options will be populated dynamically -->
        </select>
      </div>
    </div>

    <!-- Kontainer utama peta Leaflet -->
    <div id="map"></div>

    <!-- Panel samping: menampilkan detail sekolah saat marker diklik -->
    <div id="infoPanel" class="info-panel">
      <h3>Informasi Sekolah</h3>
      <div id="infoContent"></div>
    </div>

    <!-- Footer halaman -->
    <div class="footer">
      &copy; 2025 Web GIS Sekolah Banda Aceh | Data dari OpenStreetMap
    </div>

    <!-- Library Leaflet untuk rendering peta -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
    <!-- Plugin MarkerCluster untuk mengelompokkan marker yang berdekatan -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.js"></script>

    <script>
      // Inisialisasi map dengan koordinat Banda Aceh
      // setView([lat, lng], zoomLevel) — zoom 13 cocok untuk tampilan kota
      var map = L.map("map").setView([5.5548, 95.3171], 13);

      // --- Definisi basemap (peta dasar) ---

      // Layer OpenStreetMap standar
      var osm = L.tileLayer(
        "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
        {
          attribution: "© OpenStreetMap contributors",
        }
      );

      // Layer citra satelit dari Esri
      var satellite = L.tileLayer(
        "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
        {
          attribution: "Imagery © Esri",
          maxZoom: 19,
        }
      );

      // Objek baseMaps digunakan oleh L.control.layers untuk pemilihan basemap
      var baseMaps = {
        OpenStreetMap: osm,
        "Citra Satelit": satellite,
      };

      // Set OSM sebagai basemap awal yang ditampilkan
      osm.addTo(map);

      // --- Inisialisasi layer data sekolah ---

      // geojsonLayer: layer GeoJSON mentah hasil loading data
      var geojsonLayer;

      // markerClusterGroup: layer yang mengelompokkan marker agar tidak tumpang tindih
      var markerClusterGroup = L.markerClusterGroup();

      // overlayMaps digunakan oleh kontrol layer untuk toggle overlay
      var overlayMaps = {
        "Data Sekolah": markerClusterGroup,
      };

      // Tambahkan kontrol layer (switcher basemap + overlay) ke peta
      L.control.layers(baseMaps, overlayMaps).addTo(map);

      // Tambahkan skala jarak (metrik saja, tanpa imperial)
      L.control.scale({ imperial: false }).addTo(map);

      // --- Fungsi utilitas ---

      /**
       * Menentukan warna marker berdasarkan jenis sekolah.
       * Pengecekan dilakukan dengan includes() agar fleksibel terhadap variasi penulisan.
       * @param {string} schoolType - Jenis sekolah (misal: "SD", "SMP", dll.)
       * @returns {string} Kode warna heksadesimal
       */
      function getSchoolColor(schoolType) {
        schoolType = (schoolType || "").toLowerCase();
        if (schoolType.includes("sd") || schoolType.includes("sekolah dasar")) {
          return "#4CAF50"; // Hijau untuk SD
        } else if (
          schoolType.includes("smp") ||
          schoolType.includes("sekolah menengah pertama")
        ) {
          return "#2196F3"; // Biru untuk SMP
        } else if (
          schoolType.includes("sma") ||
          schoolType.includes("sekolah menengah atas")
        ) {
          return "#FFC107"; // Kuning untuk SMA
        } else if (
          schoolType.includes("smk") ||
          schoolType.includes("sekolah menengah kejuruan")
        ) {
          return "#FF5722"; // Oranye untuk SMK
        } else if (
          schoolType.includes("tk") ||
          schoolType.includes("taman kanak")
        ) {
          return "#9C27B0"; // Ungu untuk TK
        } else if (
          schoolType.includes("universitas") ||
          schoolType.includes("univ") ||
          schoolType.includes("perguruan tinggi")
        ) {
          return "#F44336"; // Merah untuk universitas
        } else {
          return "#607D8B"; // Abu-abu untuk jenis lainnya
        }
      }

      /**
       * Membuat ikon marker kustom berbentuk lingkaran berwarna.
       * Menggunakan L.divIcon agar bisa diberi warna dinamis via HTML/CSS inline.
       * @param {string} schoolType - Jenis sekolah untuk menentukan warna
       * @returns {L.DivIcon} Ikon Leaflet kustom
       */
      function createSchoolIcon(schoolType) {
        const color = getSchoolColor(schoolType);
        return L.divIcon({
          className: "school-icon",
          html:
            '<div style="background-color:' +
            color +
            '; width: 24px; height: 24px; border-radius: 12px; border: 2px solid white;">S</div>',
          iconSize: [28, 28],
          iconAnchor: [14, 14], // Titik anchor di tengah ikon
        });
      }

      /**
       * Mengubah nama properti OSM mentah menjadi label yang lebih ramah pengguna.
       * Misalnya: "addr:street" → "Alamat", "amenity" → "Jenis".
       * @param {string} name - Nama properti asli dari GeoJSON
       * @returns {string} Label yang sudah diformat
       */
      function cleanPropertyName(name) {
        // Ganti underscore dan titik dua dengan spasi, lalu kapitalisasi huruf pertama
        name = name
          .replace(/_/g, " ")
          .replace(/:/g, " ")
          .replace(/^[a-z]/, function (m) {
            return m.toUpperCase();
          });

        // Override khusus untuk tag OSM yang umum
        if (name === "Name") return "Nama";
        if (name === "Amenity") return "Jenis";
        if (name === "Operator") return "Pengelola";
        if (name === "Operator Type") return "Jenis Pengelola";
        if (name === "Addr Street") return "Alamat";
        if (name === "Phone") return "Telepon";
        if (name === "Website") return "Situs Web";

        return name;
      }

      /**
       * Membuat konten HTML untuk popup dan panel info sekolah.
       * Properti prioritas ditampilkan lebih dulu, sisanya menyusul.
       * @param {Object} properties - Properti fitur GeoJSON
       * @returns {string} String HTML konten popup
       */
      function createPopupContent(properties) {
        let content = '<div class="popup-content">';

        // Ambil nama sekolah; fallback ke "Sekolah" jika tidak ada
        const name = properties.name || properties.nama || "Sekolah";
        content += "<h3>" + name + "</h3>";

        content += "<table>";

        // Daftar properti yang ditampilkan terlebih dahulu (urutan prioritas)
        const priorityProps = [
          "amenity",
          "isced",
          "operator",
          "operator_type",
          "addr:street",
          "addr:city",
          "phone",
          "website",
        ];

        // Tampilkan properti prioritas jika ada nilainya
        priorityProps.forEach((prop) => {
          if (properties[prop]) {
            let value = properties[prop];

            // Jika properti adalah website, buat sebagai tautan HTML
            if (prop === "website" && !value.startsWith("http")) {
              // Tambahkan http:// jika belum ada protokol
              value =
                '<a href="http://' +
                value +
                '" target="_blank">' +
                value +
                "</a>";
            } else if (prop === "website") {
              value =
                '<a href="' + value + '" target="_blank">' + value + "</a>";
            }

            content += `<tr><td><strong>${cleanPropertyName(
              prop
            )}:</strong></td><td>${value}</td></tr>`;
          }
        });

        // Tampilkan properti lainnya (di luar prioritas dan properti internal)
        for (let key in properties) {
          if (
            properties.hasOwnProperty(key) &&
            !priorityProps.includes(key) &&
            key !== "name" &&         // Sudah ditampilkan di judul
            key !== "@id" &&          // ID internal OSM, tidak perlu ditampilkan
            key !== "id" &&
            !key.startsWith("_") &&   // Properti internal (underscore prefix)
            key !== "schoolType" &&   // Properti tambahan hasil pemrosesan JS
            key !== "coordinatesType" // Penanda tipe koordinat asal (polygon/point)
          ) {
            content += `<tr><td><strong>${cleanPropertyName(
              key
            )}:</strong></td><td>${properties[key]}</td></tr>`;
          }
        }

        content += "</table>";
        content += "</div>";

        return content;
      }

      /**
       * Mengonversi format data mentah dari Overpass API ke format GeoJSON standar.
       * Overpass mengembalikan array "elements" dengan node/way, bukan FeatureCollection.
       * Hanya memproses elemen dengan amenity: school, university, kindergarten, college.
       * @param {Object} data - Data JSON mentah dari Overpass API
       * @returns {Object} GeoJSON FeatureCollection
       */
      function processOverpassData(data) {
        let featureCollection = {
          type: "FeatureCollection",
          features: [],
        };

        if (data.elements) {
          data.elements.forEach((element) => {
            // Hanya proses node dan way yang merupakan fasilitas pendidikan
            if (
              (element.type === "node" || element.type === "way") &&
              element.tags &&
              element.tags.amenity &&
              (element.tags.amenity === "school" ||
                element.tags.amenity === "university" ||
                element.tags.amenity === "kindergarten" ||
                element.tags.amenity === "college")
            ) {
              let feature = {
                type: "Feature",
                properties: element.tags || {},
                geometry: {
                  type: "Point",
                  coordinates: [],
                },
              };

              // Tambahkan ID OSM sebagai properti
              feature.properties["@id"] = element.type + "/" + element.id;

              if (element.type === "node" && element.lat && element.lon) {
                // Node langsung memiliki koordinat lat/lon
                feature.geometry.coordinates = [element.lon, element.lat];
                featureCollection.features.push(feature);
              } else if (
                element.type === "way" &&
                element.center &&
                element.center.lat &&
                element.center.lon
              ) {
                // Way (poligon) menggunakan titik tengah (center) yang dihitung Overpass
                feature.geometry.coordinates = [
                  element.center.lon,
                  element.center.lat,
                ];
                featureCollection.features.push(feature);
              }
            }
          });
        }

        return featureCollection;
      }

      /**
       * Menghitung titik centroid (titik tengah rata-rata) dari koordinat poligon.
       * Digunakan untuk mengonversi fitur Polygon/MultiPolygon menjadi titik tunggal.
       * @param {Array} coordinates - Array koordinat dari geometri GeoJSON
       * @returns {Array|null} Koordinat [lon, lat] centroid, atau null jika gagal
       */
      function getCentroid(coordinates) {
        if (!coordinates || coordinates.length === 0) {
          return null;
        }

        let points;

        // Deteksi format koordinat: MultiPolygon, Polygon, atau Point
        if (Array.isArray(coordinates[0]) && Array.isArray(coordinates[0][0])) {
          // Format Polygon: [[[lon, lat], ...]] — ambil ring pertama (outer ring)
          points = coordinates[0];
        } else if (
          Array.isArray(coordinates[0]) &&
          coordinates[0].length === 2 &&
          typeof coordinates[0][0] === "number"
        ) {
          // Format array of points: [[lon, lat], ...]
          points = coordinates;
        } else if (
          coordinates.length === 2 &&
          typeof coordinates[0] === "number"
        ) {
          // Sudah berupa titik tunggal [lon, lat]
          return coordinates;
        } else {
          console.error("Format koordinat tidak dikenali:", coordinates);
          return null;
        }

        // Hitung rata-rata koordinat X (lon) dan Y (lat) dari semua titik
        let sumX = 0;
        let sumY = 0;

        for (let i = 0; i < points.length; i++) {
          sumX += points[i][0];
          sumY += points[i][1];
        }

        return [sumX / points.length, sumY / points.length];
      }

      /**
       * Menentukan jenis sekolah dari properti OSM.
       * Menggunakan tag "isced" (International Standard Classification of Education)
       * jika tersedia, kemudian mencoba menebak dari nama sekolah.
       * @param {Object} properties - Properti fitur GeoJSON
       * @returns {string} Label jenis sekolah (misal: "SD", "SMP", "Universitas", dll.)
       */
      function getSchoolType(properties) {
        if (!properties) return "Lainnya";

        // Cek tag amenity untuk perguruan tinggi dan TK
        if (properties.amenity === "university") return "Universitas";
        if (properties.amenity === "college") return "Perguruan Tinggi";
        if (properties.amenity === "kindergarten") return "TK";

        // Gunakan tag ISCED jika tersedia (standar internasional jenjang pendidikan)
        if (properties.isced) {
          const isced = properties.isced;
          if (isced === "0") return "TK";
          if (isced === "1") return "SD";
          if (isced === "2") return "SMP";
          if (isced === "3") return "SMA/SMK";
        }

        // Fallback: tebak dari kata kunci dalam nama sekolah
        const name = (properties.name || "").toLowerCase();
        if (name.includes("universitas") || name.includes("univ"))
          return "Universitas";
        if (name.includes("sma")) return "SMA";
        if (name.includes("smk")) return "SMK";
        if (name.includes("smp")) return "SMP";
        if (
          name.includes("sd ") ||
          name.startsWith("sd ") ||
          name.includes("sekolah dasar")
        )
          return "SD";
        if (
          name.includes("tk ") ||
          name.startsWith("tk ") ||
          name.includes("taman kanak")
        )
          return "TK";

        // Jika tidak ada yang cocok, kembalikan label generik
        return "Sekolah";
      }

      /**
       * Memuat data sekolah dari file GeoJSON lokal.
       * Mendukung dua format: GeoJSON standar dan format mentah Overpass API.
       * Jika berhasil, data diteruskan ke processGeoJsonData().
       */
      function loadSchoolData() {
        fetch("data/data.geojson")
          .then((response) => {
            if (!response.ok) {
              throw new Error("Network response was not ok");
            }
            return response.json();
          })
          .then((data) => {
            let geoJsonData;
            // Deteksi apakah ini format Overpass (ada properti "elements")
            // atau GeoJSON standar (ada properti "features")
            if (data.elements) {
              geoJsonData = processOverpassData(data);
            } else {
              geoJsonData = data;
            }
            processGeoJsonData(geoJsonData);
          })
          .catch((error) => {
            console.error("Error loading GeoJSON:", error);
            alert(
              "Terjadi kesalahan saat memuat data. Pastikan file data.geojson tersedia."
            );
          });
      }

      /**
       * Memproses GeoJSON yang sudah dimuat:
       * 1. Mengonversi Polygon/MultiPolygon ke titik centroid
       * 2. Menambahkan properti schoolType ke setiap fitur
       * 3. Merender layer ke peta dengan marker kustom dan popup
       * 4. Mengisi opsi dropdown filter
       * @param {Object} data - GeoJSON FeatureCollection
       */
      function processGeoJsonData(data) {
        let processedFeatures = [];

        data.features.forEach((feature) => {
          // Buat salinan dalam (deep copy) agar tidak memodifikasi data asli
          let newFeature = JSON.parse(JSON.stringify(feature));

          // Konversi Polygon atau MultiPolygon menjadi titik centroid
          if (
            feature.geometry.type === "Polygon" ||
            feature.geometry.type === "MultiPolygon"
          ) {
            let centroid;

            if (feature.geometry.type === "Polygon") {
              centroid = getCentroid(feature.geometry.coordinates);
            } else if (feature.geometry.type === "MultiPolygon") {
              // Untuk MultiPolygon, ambil poligon pertama saja
              centroid = getCentroid(feature.geometry.coordinates[0]);
            }

            if (centroid) {
              // Ganti geometri dengan titik hasil konversi
              newFeature.geometry = {
                type: "Point",
                coordinates: centroid,
              };
              // Tandai bahwa koordinat ini hasil konversi
              newFeature.properties.coordinatesType =
                "converted_from_" + feature.geometry.type;
            } else {
              console.warn("Tidak dapat menghitung centroid untuk:", feature);
              return; // Lewati fitur ini jika centroid tidak bisa dihitung
            }
          }

          // Tentukan dan simpan jenis sekolah sebagai properti tambahan
          const schoolType = getSchoolType(newFeature.properties);
          newFeature.properties.schoolType = schoolType;

          processedFeatures.push(newFeature);
        });

        let processedData = {
          type: "FeatureCollection",
          features: processedFeatures,
        };

        // Buat layer GeoJSON Leaflet dari data yang sudah diproses
        geojsonLayer = L.geoJSON(processedData, {
          // onEachFeature: dipanggil untuk setiap fitur — bind popup dan event klik
          onEachFeature: function (feature, layer) {
            if (feature.properties) {
              // Popup muncul saat marker diklik di peta
              layer.bindPopup(createPopupContent(feature.properties));

              // Tampilkan info di panel samping saat marker diklik
              layer.on("click", function () {
                document.getElementById("infoPanel").style.display = "block";
                let infoContent = createPopupContent(feature.properties);
                document.getElementById("infoContent").innerHTML = infoContent;
              });
            }
          },
          // pointToLayer: mengonversi GeoJSON Point ke marker Leaflet kustom
          pointToLayer: function (feature, latlng) {
            const schoolType =
              feature.properties.schoolType ||
              getSchoolType(feature.properties);
            return L.marker(latlng, {
              icon: createSchoolIcon(schoolType),
            });
          },
        });

        // Masukkan layer GeoJSON ke dalam cluster group lalu tampilkan di peta
        markerClusterGroup.addLayer(geojsonLayer);
        markerClusterGroup.addTo(map);

        // Sesuaikan zoom peta agar semua marker terlihat
        if (geojsonLayer.getBounds().isValid()) {
          map.fitBounds(geojsonLayer.getBounds());
        }

        // Isi opsi filter dropdown berdasarkan jenis sekolah yang ada di data
        populateFilterOptions(processedData);
      }

      /**
       * Mengumpulkan semua jenis sekolah unik dari data dan mengisinya
       * sebagai opsi pada dropdown filter (#layerFilter).
       * @param {Object} data - GeoJSON FeatureCollection yang sudah diproses
       */
      function populateFilterOptions(data) {
        const filterSelect = document.getElementById("layerFilter");
        const schoolTypes = new Set(); // Set digunakan untuk menghindari duplikat

        // Hapus semua opsi kecuali "Semua Sekolah" (index 0)
        while (filterSelect.options.length > 1) {
          filterSelect.options.remove(1);
        }

        if (data.features && data.features.length > 0) {
          // Kumpulkan semua jenis sekolah unik
          data.features.forEach((feature) => {
            if (feature.properties) {
              const schoolType =
                feature.properties.schoolType ||
                getSchoolType(feature.properties);
              if (schoolType) {
                schoolTypes.add(schoolType);
              }
            }
          });

          // Tambahkan opsi ke dropdown secara alfabetis
          Array.from(schoolTypes)
            .sort()
            .forEach((type) => {
              const option = document.createElement("option");
              option.value = type;
              option.textContent = type;
              filterSelect.appendChild(option);
            });
        }
      }

      // --- Event listener: Filter berdasarkan jenis sekolah ---
      document
        .getElementById("layerFilter")
        .addEventListener("change", function (e) {
          const filterValue = e.target.value;

          if (filterValue === "all") {
            // Tampilkan semua marker jika "Semua Sekolah" dipilih
            markerClusterGroup.clearLayers();
            markerClusterGroup.addLayer(geojsonLayer);
          } else {
            // Hapus layer lama, buat layer baru dengan filter jenis sekolah
            markerClusterGroup.clearLayers();

            const filteredLayer = L.geoJSON(geojsonLayer.toGeoJSON(), {
              // Fungsi filter: hanya tampilkan fitur dengan schoolType yang sesuai
              filter: function (feature) {
                if (!feature.properties) return false;
                const schoolType =
                  feature.properties.schoolType ||
                  getSchoolType(feature.properties);
                return schoolType === filterValue;
              },
              onEachFeature: function (feature, layer) {
                if (feature.properties) {
                  layer.bindPopup(createPopupContent(feature.properties));
                  layer.on("click", function () {
                    document.getElementById("infoPanel").style.display =
                      "block";
                    let infoContent = createPopupContent(feature.properties);
                    document.getElementById("infoContent").innerHTML =
                      infoContent;
                  });
                }
              },
              pointToLayer: function (feature, latlng) {
                const schoolType =
                  feature.properties.schoolType ||
                  getSchoolType(feature.properties);
                return L.marker(latlng, {
                  icon: createSchoolIcon(schoolType),
                });
              },
            });

            markerClusterGroup.addLayer(filteredLayer);
          }
        });

      // --- Event listener: Pencarian sekolah (aktif saat tekan Enter) ---
      document.getElementById("search").addEventListener("keyup", function (e) {
        if (e.key === "Enter") {
          const searchText = e.target.value.toLowerCase();

          // Validasi minimal 2 karakter agar pencarian tidak terlalu luas
          if (searchText.length < 2) {
            alert("Masukkan minimal 2 karakter untuk pencarian");
            return;
          }

          markerClusterGroup.clearLayers();

          // Buat layer baru yang hanya berisi fitur yang cocok dengan kata kunci
          const searchLayer = L.geoJSON(geojsonLayer.toGeoJSON(), {
            filter: function (feature) {
              if (!feature.properties) return false;
              // Cek semua properti (kecuali properti internal) apakah mengandung kata kunci
              for (const prop in feature.properties) {
                if (prop !== "coordinatesType" && prop !== "schoolType") {
                  const value = String(feature.properties[prop]).toLowerCase();
                  if (value.includes(searchText)) {
                    return true; // Fitur ini cocok, tampilkan
                  }
                }
              }
              return false; // Tidak ada properti yang cocok
            },
            onEachFeature: function (feature, layer) {
              if (feature.properties) {
                layer.bindPopup(createPopupContent(feature.properties));
                layer.on("click", function () {
                  document.getElementById("infoPanel").style.display = "block";
                  let infoContent = createPopupContent(feature.properties);
                  document.getElementById("infoContent").innerHTML = infoContent;
                });
              }
            },
            pointToLayer: function (feature, latlng) {
              const schoolType =
                feature.properties.schoolType ||
                getSchoolType(feature.properties);
              return L.marker(latlng, {
                icon: createSchoolIcon(schoolType),
              });
            },
          });

          markerClusterGroup.addLayer(searchLayer);

          if (searchLayer.getLayers().length === 0) {
            // Jika tidak ada hasil, kembalikan semua marker
            alert("Tidak ada hasil yang ditemukan");
            markerClusterGroup.addLayer(geojsonLayer);
          } else {
            alert("Ditemukan " + searchLayer.getLayers().length + " sekolah");
          }
        }
      });

      // --- Legenda peta ---
      // L.control dengan posisi bottomleft agar tidak menutupi kontrol lain
      var legend = L.control({ position: "bottomleft" });

      legend.onAdd = function (map) {
        var div = L.DomUtil.create("div", "legend");
        div.innerHTML += "<h4>Legenda</h4>";

        // Peta warna untuk setiap jenis sekolah (sesuai dengan getSchoolColor)
        const schoolTypes = {
          TK: "#9C27B0",
          SD: "#4CAF50",
          SMP: "#2196F3",
          SMA: "#FFC107",
          SMK: "#FF5722",
          Universitas: "#F44336",
          Sekolah: "#607D8B",
        };

        // Buat item legenda untuk setiap jenis sekolah
        for (const type in schoolTypes) {
          div.innerHTML +=
            '<div class="legend-item">' +
            '<div class="color-box" style="background:' +
            schoolTypes[type] +
            '"></div> ' +
            type +
            "</div>";
        }

        return div;
      };

      legend.addTo(map);

      // --- Tutup panel info saat klik area kosong di peta ---
      // e.originalEvent.defaultPrevented memastikan klik pada marker tidak menutup panel
      map.on("click", function (e) {
        if (!e.originalEvent.defaultPrevented) {
          document.getElementById("infoPanel").style.display = "none";
        }
      });

      // --- Tombol "Tentang": tampilkan info aplikasi ---
      document
        .getElementById("aboutBtn")
        .addEventListener("click", function () {
          alert(
            "Web GIS Sekolah di Banda Aceh\nVersi 1.0\n\nAplikasi ini menampilkan data sekolah dari OpenStreetMap di Banda Aceh dengan fitur pencarian, filter berdasarkan jenis sekolah, dan informasi detail."
          );
        });

      // Muat data sekolah saat halaman siap
      loadSchoolData();
    </script>
  </body>
</html>
